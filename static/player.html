<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDLIX Stream Player</title>
    
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .video-container {
            margin-top: 20px;
            display: none;
        }

        .video-js {
            width: 100%;
            height: 600px;
        }

        .quality-selector {
            margin-top: 15px;
            display: none;
        }

        .quality-selector select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .info-box h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #666;
        }

        .info-value {
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 IDLIX Stream Player</h1>
            <p>Test HLS Streaming with M3U8 URLs</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label for="movieUrl">Movie URL (IDLIX):</label>
                <input 
                    type="text" 
                    id="movieUrl" 
                    placeholder="https://tv12.idlixku.com/movie/example-2024/"
                    value="https://tv12.idlixku.com/movie/crime-101-2026/"
                >
            </div>

            <div class="input-group">
                <label for="m3u8Url">Or Direct M3U8 URL:</label>
                <input 
                    type="text" 
                    id="m3u8Url" 
                    placeholder="https://jeniusplay.com/cdn/hls/.../master.m3u8"
                >
            </div>

            <button class="btn btn-primary" onclick="fetchVideoInfo()">
                🔍 Fetch Video Info
            </button>
            <button class="btn btn-primary" onclick="playDirect()">
                ▶️ Play Direct M3U8
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Loading video info...</p>
            </div>

            <div class="error" id="error"></div>
            <div class="success" id="success"></div>

            <div class="info-box" id="infoBox">
                <h3>📊 Video Information</h3>
                <div id="videoInfo"></div>
            </div>

            <div class="quality-selector" id="qualitySelector">
                <label for="quality">Select Quality:</label>
                <select id="quality" onchange="changeQuality()">
                    <option value="">Choose quality...</option>
                </select>
            </div>
        </div>

        <div class="video-container" id="videoContainer">
            <video 
                id="videoPlayer" 
                class="video-js vjs-default-skin" 
                controls 
                preload="auto"
                data-setup='{"fluid": true}'>
            </video>
        </div>
    </div>

    <!-- Video.js -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <!-- Video.js HLS plugin -->
    <script src="https://cdn.jsdelivr.net/npm/@videojs/http-streaming@3.10.0/dist/videojs-http-streaming.min.js"></script>

    <script>
        let player = null;
        let currentVideoData = null;

        // Initialize player
        function initPlayer() {
            if (player) {
                player.dispose();
            }
            
            player = videojs('videoPlayer', {
                controls: true,
                autoplay: false,
                preload: 'auto',
                fluid: true,
                responsive: true,
                html5: {
                    vhs: {
                        overrideNative: true
                    },
                    nativeVideoTracks: false,
                    nativeAudioTracks: false,
                    nativeTextTracks: false
                }
            });

            player.on('error', function() {
                showError('Player error: ' + player.error().message);
            });

            player.on('loadedmetadata', function() {
                showSuccess('Video loaded successfully!');
            });
        }

        // Get proxy URL to bypass CORS
        function getProxyURL(targetURL) {
            const encodedURL = encodeURIComponent(targetURL);
            return `/api/v1/proxy?url=${encodedURL}`;
        }

        // Fetch video info from API
        async function fetchVideoInfo() {
            const movieUrl = document.getElementById('movieUrl').value.trim();
            
            if (!movieUrl) {
                showError('Please enter a movie URL');
                return;
            }

            showLoading(true);
            hideMessages();

            try {
                const response = await fetch('http://localhost:8080/api/v1/video/info', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: movieUrl })
                });

                const data = await response.json();

                if (data.status && data.data) {
                    currentVideoData = data.data;
                    displayVideoInfo(data.data);
                    
                    if (data.data.m3u8_url) {
                        // Use proxy URL to bypass CORS
                        const proxyURL = getProxyURL(data.data.m3u8_url);
                        document.getElementById('m3u8Url').value = proxyURL;
                        playM3U8(proxyURL);
                    }

                    if (data.data.variants && data.data.variants.length > 0) {
                        displayQualityOptions(data.data.variants);
                    }

                    showSuccess('Video info loaded successfully!');
                } else {
                    showError(data.message || 'Failed to fetch video info');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // Play direct M3U8
        function playDirect() {
            let m3u8Url = document.getElementById('m3u8Url').value.trim();
            
            if (!m3u8Url) {
                showError('Please enter M3U8 URL');
                return;
            }

            // If URL doesn't start with /api/v1/proxy, proxy it
            if (!m3u8Url.startsWith('/api/v1/proxy')) {
                m3u8Url = getProxyURL(m3u8Url);
            }

            playM3U8(m3u8Url);
        }

        // Play M3U8 URL
        function playM3U8(url) {
            if (!player) {
                initPlayer();
            }

            document.getElementById('videoContainer').style.display = 'block';
            
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });

            player.ready(function() {
                player.play();
            });

            // Scroll to video
            document.getElementById('videoContainer').scrollIntoView({ behavior: 'smooth' });
        }

        // Display video info
        function displayVideoInfo(data) {
            const infoBox = document.getElementById('infoBox');
            const videoInfo = document.getElementById('videoInfo');
            
            let html = '';
            
            if (data.video_name) {
                html += `<div class="info-item">
                    <span class="info-label">Title:</span>
                    <span class="info-value">${data.video_name}</span>
                </div>`;
            }

            if (data.video_id) {
                html += `<div class="info-item">
                    <span class="info-label">Video ID:</span>
                    <span class="info-value">${data.video_id}</span>
                </div>`;
            }

            if (data.is_variant_playlist !== undefined) {
                html += `<div class="info-item">
                    <span class="info-label">Has Variants:</span>
                    <span class="info-value">${data.is_variant_playlist ? 'Yes' : 'No'}</span>
                </div>`;
            }

            if (data.variants) {
                html += `<div class="info-item">
                    <span class="info-label">Quality Options:</span>
                    <span class="info-value">${data.variants.length} variants</span>
                </div>`;
            }

            if (data.subtitle && data.subtitle.available) {
                html += `<div class="info-item">
                    <span class="info-label">Subtitle:</span>
                    <span class="info-value">Available (${data.subtitle.format})</span>
                </div>`;
            }

            videoInfo.innerHTML = html;
            infoBox.style.display = 'block';
        }

        // Display quality options
        function displayQualityOptions(variants) {
            const selector = document.getElementById('quality');
            selector.innerHTML = '<option value="">Auto (Adaptive)</option>';

            variants.forEach((variant, index) => {
                const option = document.createElement('option');
                // Proxy the variant URI to bypass CORS
                option.value = getProxyURL(variant.uri);
                option.textContent = `${variant.resolution || 'Unknown'} (${Math.round(variant.bandwidth / 1000)} kbps)`;
                selector.appendChild(option);
            });

            document.getElementById('qualitySelector').style.display = 'block';
        }

        // Change quality
        function changeQuality() {
            const qualityUrl = document.getElementById('quality').value;
            
            if (qualityUrl) {
                // URL is already proxied from displayQualityOptions
                playM3U8(qualityUrl);
                showSuccess('Quality changed!');
            } else {
                // Adaptive (use master playlist with proxy)
                if (currentVideoData && currentVideoData.m3u8_url) {
                    playM3U8(getProxyURL(currentVideoData.m3u8_url));
                    showSuccess('Switched to adaptive quality');
                }
            }
        }

        // UI helpers
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => errorEl.style.display = 'none', 5000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('success');
            successEl.textContent = message;
            successEl.style.display = 'block';
            setTimeout(() => successEl.style.display = 'none', 3000);
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        // Initialize player on load
        window.addEventListener('DOMContentLoaded', function() {
            initPlayer();
        });
    </script>
</body>
</html>
